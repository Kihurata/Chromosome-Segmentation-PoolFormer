stage: stage3_sep
experiment_name: poolformer_overlapping_v1

training:
  data_root: "C:\\data\\stage3_separation\\overlapping"
  save_dir: "experiments/stage3_sep"
  work_dir: "experiments/stage3_sep" # Legacy support if code uses it
  epochs: 100
  warmup_epochs: 5
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 1.0e-4
  patience: 12
  min_delta: 1.0e-4
  num_workers: 1
  seed: 42

model:
  type: poolformer_multitask
  encoder_name: tu-poolformer_m36
  pretrained_weights: "D:\\Code\\NCKH\\weights\\poolformer_m36.pth"
  input_size: 384
  input_channels: 3
  output_classes: 3

loss:
  lambda_fg: 1.0
  lambda_overlap: 1.2
  lambda_boundary: 1.0
  lambda_consistency: 0.2
  fg_threshold: 0.5
  overlap_threshold: 0.45
  boundary_threshold: 0.35
  boundary_pos_weight: 3.0
